<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Project Upload</title>
  </head>

  <body>
    <div>
      <input
        name="moodleId"
        id="moodleId"
        type="number"
      />
      <input
        name="title"
        id="title"
        type="text"
      />
      <input
        name="description"
        id="description"
        type="text"
      />
      <input
        name="picture"
        id="picture"
        type="file"
      />
      <button onclick="send()">Create</button>
    </div>
  </body>
</html>

<script>
  function send() {
    const formData = new FormData();
    formData.append('moodleId', moodleId.value);
    formData.append('title', title.value);
    formData.append('description', description.value);
    formData.append('picture', picture.files[0]);

    fetch('/projects/create', {
      method: 'POST',
      body: formData
    })
      .then((res) => {
        window.location = '../index.html';
      })
      .catch((err) => {
        console.log(err);
      });
  }
</script>
