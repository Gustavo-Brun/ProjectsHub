<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta content="width=device-width, initial-scale=1.0" />
    <title>Project Register</title>

    <script src="/js/middleware.js"></script>

    <link
      rel="stylesheet"
      href="../styles.shared.css"
    />
    <link
      rel="stylesheet"
      href="styles.css"
    />
  </head>

  <body onload="validateSession()">
    <div class="form_container">
      <div class="input_container">
        <h1>Cadastre seu Projeto!</h1>
        <label for="github">Link do GitHub</label>
        <input
          id="github_input"
          type="text"
          placeholder="https://github.com/Gustavo-Brun/ProjectsHub"
        />
      </div>
      <div class="input_container">
        <label for="title">Título</label>
        <input
          id="title_input"
          type="text"
          placeholder="ProjectsHub"
        />
      </div>
      <div class="input_container">
        <label for="description">Descrição</label>
        <span>opcional</span>
        <textarea
          id="description_textarea"
          placeholder="Lorem ipsum dolor sit amet consectetur adipiscing elit."
        ></textarea>
      </div>
      <div class="input_container">
        <label for="picture">Imagem/Thumbnail</label>
        <span>opcional</span>
        <input
          id="picture_input"
          type="file"
        />
      </div>

      <button onclick="send()">Cadastrar Projeto</button>
    </div>
  </body>
</html>

<script>
  function send() {
    const title = title_input.value;
    const githubUrl = github_input.value;
    const picture = picture_input.files[0];
    const description = description_textarea.value;
    const userId = sessionStorage.userId;

    if (!userId) {
      return (window.location = '/auth/signup');
    } else if (!githubUrl.includes('github.com/')) {
      return alert('Insira um link de repositório válido!');
    } else if (title.length < 3) {
      return alert('O Título deve conter ao menos 3 caracteres.');
    }

    fetch('/projects/create', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        title,
        githubUrl,
        picture,
        description,
        userId
      })
    })
      .then((res) => {
        if (res.ok) {
          window.location = '/app/projects/catalog';
        } else if (res.status == 409) {
          alert(`Um projeto com o Link '${githubUrl}' e/ou o Título '${title}' já foi cadastrado.`);
        } else {
          alert('Opss, algo deu errado. Tente novamente mais tarde!');
        }
      })
      .catch((err) => {
        console.log(err);
        alert('Ops, algo deu errado. Tente novamente mais tarde!');
      });
  }
</script>
